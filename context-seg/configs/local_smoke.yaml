model:
  # 本地 smoke test 尽量轻量：只验证真实数据、LingBot、loss、可视化链路。
  head_type: mask2former_lite
  num_queries: 20
  token_layer: -1
  hidden_dim: 128
  pixel_dim: 128
  decoder_layers: 2
  ffn_dim: 512
  num_attention_heads: 4
  num_predictor_layers: 1
  mask_size: [518, 518]
  patch_size: 14

data:
  root: data_davis
  mask_root: data_sam_masks_smoke
  clip_length: 2
  num_scale_frames: 1
  clip_stride: 1
  limit_scenes: ["bear"]
  limit_clips: 1
  overfit_limit_clips: 1

lingbot:
  checkpoint: paths/lingbot-map.pt
  freeze_backbone: true
  use_no_grad: true
  enable_3d_rope: true
  max_frame_num: 1024
  # 本地/AutoDL 默认不一定安装 flashinfer，用 PyTorch SDPA 更稳。
  use_sdpa: true
  keyframe_interval: 1
  kv_cache_camera_only: true
  kv_cache_sliding_window: 16
  kv_cache_scale_frames: 1
  kv_cache_cross_frame_special: true
  kv_cache_include_scale_frames: true

sam:
  checkpoint: paths/sam_vit_h_4b8939.pth
  model_type: vit_h

matcher:
  cost_class: 2.0
  cost_mask: 5.0
  cost_dice: 5.0
  cost_size: 96

loss:
  class_weight: 2.0
  mask_weight: 5.0
  dice_weight: 5.0
  no_object_weight: 0.1
  num_points: 2048
  oversample_ratio: 3.0
  importance_sample_ratio: 0.75

pseudo_mask:
  min_area_ratio: 0.001
  max_area_ratio: 0.6
  nms_iou: 0.8

train:
  batch_size: 1
  num_workers: 0
  device: cuda
  lr: 0.0001
  weight_decay: 0.0001
  max_steps: 2
  overfit_steps: 2
  grad_clip: 1.0
  max_target_masks: 8
  objectness_threshold: 0.5
  max_active_queries: 8
  output_dir: context-seg/runs/local_smoke
  vis_interval: 1
  save_interval: 2
