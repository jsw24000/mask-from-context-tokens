model:
  # 32GB 显存可以先用 32 个 object query；若显存紧张再降到 16。
  head_type: mask2former_lite
  num_queries: 50
  token_layer: -1
  hidden_dim: 192
  pixel_dim: 192
  decoder_layers: 3
  ffn_dim: 768
  num_attention_heads: 6
  num_predictor_layers: 3
  # 518 与 LingBot/DINOv2 常见输入尺寸一致，patch_size=14 时得到 37x37 patch grid。
  mask_size: [518, 518]
  patch_size: 14

data:
  root: /root/autodl-tmp/mask-from-context-tokens/data_davis
  mask_root: /root/autodl-tmp/mask-from-context-tokens/data_sam_masks
  # 前 4 帧作为 scale frames，后续 8 帧逐帧 streaming 训练。
  clip_length: 8
  num_scale_frames: 2
  clip_stride: 1
  limit_scenes:
  limit_clips:
  overfit_limit_clips: 4

lingbot:
  checkpoint: /root/autodl-tmp/mask-from-context-tokens/paths/lingbot-map.pt
  freeze_backbone: true
  use_no_grad: true
  enable_3d_rope: true
  max_frame_num: 1024
  # AutoDL 镜像通常没有 flashinfer；先用 PyTorch SDPA，跑通后再考虑 flashinfer 加速。
  use_sdpa: true
  keyframe_interval: 1
  kv_cache_camera_only: true
  kv_cache_sliding_window: 64
  kv_cache_scale_frames: 8
  kv_cache_cross_frame_special: true
  kv_cache_include_scale_frames: true

sam:
  checkpoint: /root/autodl-tmp/mask-from-context-tokens/paths/sam_vit_h_4b8939.pth
  model_type: vit_h

matcher:
  cost_class: 2.0
  cost_mask: 5.0
  cost_dice: 5.0
  cost_size: 128

loss:
  class_weight: 2.0
  mask_weight: 5.0
  dice_weight: 5.0
  no_object_weight: 0.1
  num_points: 4096
  oversample_ratio: 3.0
  importance_sample_ratio: 0.75

pseudo_mask:
  min_area_ratio: 0.001
  max_area_ratio: 0.6
  nms_iou: 0.8

train:
  # LingBot backbone 很重，第一版保持 batch_size=1；32GB 显存主要用于更长 clip/更高分辨率。
  batch_size: 1
  # 12 vCPU 上先用 4 个 worker；如果 CPU/磁盘跟得上，可试 6 或 8。
  num_workers: 4
  device: cuda
  lr: 0.0001
  weight_decay: 0.0001
  max_steps: 1000
  overfit_steps: 100
  grad_clip: 1.0
  # 每张图最多取 20 个过滤后的 SAM masks 参与匹配，避免拟合全部碎片和重叠区域。
  max_target_masks: 12
  objectness_threshold: 0.5
  max_active_queries: 12
  output_dir: /root/autodl-tmp/mask-from-context-tokens/context-seg/runs/autodl_overfit
  vis_interval: 50
  save_interval: 200
