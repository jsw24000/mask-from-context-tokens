model:
  # 32GB 显存可以先用 32 个 object query；若显存紧张再降到 16。
  num_queries: 64
  token_layer: -1
  hidden_dim: 256
  mask_hidden_dim: 256
  num_attention_heads: 8
  num_predictor_layers: 3
  # 518 与 LingBot/DINOv2 常见输入尺寸一致，patch_size=14 时得到 37x37 patch grid。
  mask_size: [518, 518]
  patch_size: 14

data:
  root: /root/autodl-tmp/mask-from-context-tokens/data_davis
  mask_root: /root/autodl-tmp/mask-from-context-tokens/data_sam_masks
  # 前 4 帧作为 scale frames，后续 8 帧逐帧 streaming 训练。
  clip_length: 12
  num_scale_frames: 4
  clip_stride: 1
  limit_scenes:
  limit_clips:
  overfit_limit_clips: 4

lingbot:
  checkpoint: /root/autodl-tmp/mask-from-context-tokens/paths/lingbot-map.pt
  freeze_backbone: true
  use_no_grad: true
  enable_3d_rope: true
  max_frame_num: 1024
  # AutoDL 镜像通常没有 flashinfer；先用 PyTorch SDPA，跑通后再考虑 flashinfer 加速。
  use_sdpa: true
  keyframe_interval: 1
  kv_cache_camera_only: true
  kv_cache_sliding_window: 64
  kv_cache_scale_frames: 8
  kv_cache_cross_frame_special: true
  kv_cache_include_scale_frames: true

sam:
  checkpoint: /root/autodl-tmp/mask-from-context-tokens/paths/sam_vit_h_4b8939.pth
  model_type: vit_h

matcher:
  cost_bce: 0.5
  cost_dice: 2.0
  cost_objectness: 1.0
  cost_size: 128

loss:
  mask_bce_weight: 0.2
  mask_dice_weight: 2.0
  objectness_weight: 1.0
  no_object_weight: 0.5
  balanced_bce: true

train:
  # LingBot backbone 很重，第一版保持 batch_size=1；32GB 显存主要用于更长 clip/更高分辨率。
  batch_size: 1
  # 12 vCPU 上先用 4 个 worker；如果 CPU/磁盘跟得上，可试 6 或 8。
  num_workers: 4
  device: cuda
  lr: 0.0001
  weight_decay: 0.0001
  max_steps: 1000
  overfit_steps: 100
  grad_clip: 1.0
  # 每张图最多取 16 个 SAM masks 参与匹配；num_queries=64 时会保留一部分 no-object query。
  max_target_masks: 16
  objectness_threshold: 0.7
  max_active_queries: 16
  output_dir: /root/autodl-tmp/mask-from-context-tokens/context-seg/runs/autodl_overfit
  vis_interval: 20
  save_interval: 100
