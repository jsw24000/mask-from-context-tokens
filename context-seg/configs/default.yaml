model:
  head_type: mask2former_lite
  num_queries: 100
  token_layer: -1
  hidden_dim: 256
  pixel_dim: 256
  decoder_layers: 6
  ffn_dim: 1024
  num_attention_heads: 8
  num_predictor_layers: 3
  mask_size: [518, 518]
  patch_size: 14

data:
  root: data
  mask_root: data_sam_masks
  clip_length: 12
  num_scale_frames: 4
  clip_stride: 1
  limit_scenes:
  limit_clips:
  overfit_limit_clips: 4

lingbot:
  checkpoint: paths/lingbot-map.pt
  freeze_backbone: true
  use_no_grad: true
  enable_3d_rope: true
  max_frame_num: 1024
  # 默认使用 PyTorch SDPA，避免没有安装 flashinfer 时无法启动 LingBot。
  use_sdpa: true
  keyframe_interval: 1
  kv_cache_camera_only: true
  kv_cache_sliding_window: 64
  kv_cache_scale_frames: 8
  kv_cache_cross_frame_special: true
  kv_cache_include_scale_frames: true

sam:
  checkpoint:
  model_type: vit_b

matcher:
  cost_class: 2.0
  cost_mask: 5.0
  cost_dice: 5.0
  cost_size: 128

loss:
  class_weight: 2.0
  mask_weight: 5.0
  dice_weight: 5.0
  boundary_weight: 1.0
  boundary_size: 128
  boundary_kernel_size: 3
  no_object_weight: 0.1
  num_points: 12544
  oversample_ratio: 3.0
  importance_sample_ratio: 0.75

pseudo_mask:
  min_area_ratio: 0.001
  max_area_ratio: 0.6
  nms_iou: 0.8

train:
  batch_size: 1
  num_workers: 0
  device: cuda
  lr: 0.0001
  refiner_lr: 0.0005
  weight_decay: 0.0001
  max_steps: 100
  overfit_steps: 20
  grad_clip: 1.0
  max_target_masks: 20
  objectness_threshold: 0.5
  max_active_queries: 20
  output_dir: context-seg/runs/overfit
  vis_interval: 5
  save_interval: 20
