model:
  num_queries: 64
  token_layer: -1
  hidden_dim: 256
  mask_hidden_dim: 256
  num_attention_heads: 8
  num_predictor_layers: 3
  mask_size: [518, 518]
  patch_size: 14

data:
  root: data
  mask_root: data_sam_masks
  clip_length: 12
  num_scale_frames: 4
  clip_stride: 1
  limit_scenes:
  limit_clips:
  overfit_limit_clips: 4

lingbot:
  checkpoint: paths/lingbot-map.pt
  freeze_backbone: true
  use_no_grad: true
  enable_3d_rope: true
  max_frame_num: 1024
  # 默认使用 PyTorch SDPA，避免没有安装 flashinfer 时无法启动 LingBot。
  use_sdpa: true
  keyframe_interval: 1
  kv_cache_camera_only: true
  kv_cache_sliding_window: 64
  kv_cache_scale_frames: 8
  kv_cache_cross_frame_special: true
  kv_cache_include_scale_frames: true

sam:
  checkpoint:
  model_type: vit_b

matcher:
  cost_bce: 0.5
  cost_dice: 2.0
  cost_objectness: 1.0
  cost_size: 128

loss:
  mask_bce_weight: 0.2
  mask_dice_weight: 2.0
  objectness_weight: 1.0
  no_object_weight: 0.1
  balanced_bce: true

train:
  batch_size: 1
  num_workers: 0
  device: cuda
  lr: 0.0001
  weight_decay: 0.0001
  max_steps: 100
  overfit_steps: 20
  grad_clip: 1.0
  max_target_masks: 48
  objectness_threshold: 0.5
  max_active_queries: 16
  output_dir: context-seg/runs/overfit
  vis_interval: 5
  save_interval: 20
