# KITTI base config — evaluates lingbot_map on the two KITTI variants:
#   - kitti_504x280  : downsampled KITTI sequences used in our ablations
#   - kitti          : full-resolution KITTI sequences
workspace: /path/to/workspace/kitti

datasets:
  - kitti_504x280

methods:
  - lingbot_map

evaluation:
  traj:
    enable: true
    vis: true
  auc:
    enable: false
  depth:
    enable: false
  points:
    enable: false
