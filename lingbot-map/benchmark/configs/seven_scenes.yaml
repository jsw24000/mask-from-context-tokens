# 7Scenes — lingbot_map trajectory + AUC + point-cloud evaluation.
# Uses the stride-5 variant (`7scenes_s5`).
workspace: /data2/clz/benchmark_7scenes # --- IGNORE ---

datasets:
  - seven_scenes

methods:
  - lingbot_map

evaluation:
  traj:
    enable: true
    vis: true
  auc:
    enable: true
    vis: true
    aggregation: both
  depth:
    enable: false
  points:
    enable: true
    vis: false
    icp_threshold: 0.1
    conf_threshold: 0.0
