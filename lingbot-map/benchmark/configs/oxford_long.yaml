# Oxford Spires long sequences (stride 1) — lingbot_map ATE-only evaluation.
# For the short-sequence pose + AUC benchmark, use configs/oxford.yaml.
workspace: /path/to/workspace/oxford_long

datasets:
  - oxford_long

methods:
  - lingbot_map

evaluation:
  traj:
    enable: true
    vis: true
  auc:
    enable: false
  depth:
    enable: false
  points:
    enable: false
